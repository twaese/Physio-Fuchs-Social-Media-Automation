<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PF Feed Facebook v1 — Foto-Layout 1080×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /*
   * PHYSIO FUCHS – Facebook Feed v1 (1080×1080 Square)
   * Adaption des IG v12 Foto-Layouts für Square 1:1.
   *
   * Architektur identisch zu IG:
   *  - Vollflächen-Praxis-Foto
   *  - Grüner Titel-Banner oben rechts mit Ginkgo
   *  - Weiße Logo-Karte unten links
   *
   * Maße proportional reduziert wegen geringerer Höhe (1080 statt 1350).
   *
   * Platzhalter (von WF-02 ersetzt):
   *   {{TITEL}}             — kurzer Hook
   *   {{BACKGROUND_PHOTO}}  — URL des Praxis-Fotos (variabel pro Content)
   *
   * v2-Änderung ggü. v1: Background-Foto ist jetzt VARIABEL pro Content.
   * WF-02 v18.3 sucht im SP-Ordner /Content_Socialmedia/Fotos/{Jahr}/
   * nach `PF_{Jahr}_{ItemID-3stellig}_*.jpg`. Fallback-Kaskade:
   * Item-Foto → Stock-Pool → assets/judith-behandlung-01.png.
   */
  :root {
    --pf-green-bg:    #7E9963;
    --pf-cream:       #F4EFE2;
    --pf-cream-soft:  #E8E3D4;
    --pf-brown:       #7C6149;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'EB Garamond', Garamond, Georgia, serif;
    -webkit-font-smoothing: antialiased;
    background: #2F3A28;
  }

  .canvas {
    position: relative;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    z-index: 0;
  }

  /* Titel-Banner — schmaler als bei IG (240px statt 280px), proportional */
  .title-banner {
    position: absolute;
    top: 50px;
    right: 0;
    width: 70%;
    height: 240px;
    background: var(--pf-green-bg);
    color: var(--pf-cream);
    padding: 24px 0 24px 50px;
    z-index: 2;
    display: flex;
    align-items: center;
  }

  .title-banner .ginkgo {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    height: auto;
    pointer-events: none;
  }

  .titel {
    font-family: 'EB Garamond', Garamond, Georgia, serif;
    font-size: 48px;
    font-weight: 500;
    line-height: 1.06;
    letter-spacing: 0.5px;
    color: var(--pf-cream);
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    max-width: 55%;
  }

  /* Logo-Karte */
  .logo-card {
    position: absolute;
    bottom: 50px;
    left: 0;
    width: 46%;
    background: #FFFFFF;
    padding: 14px 50px 14px 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 2;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .logo-card img {
    width: 200px;
    height: 200px;
    display: block;
  }

  .logo-card .brand-text {
    font-family: 'EB Garamond', Garamond, Georgia, serif;
    font-size: 42px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--pf-brown);
    text-transform: uppercase;
    text-align: center;
    line-height: 1;
    white-space: nowrap;
    font-feature-settings: "lnum" 1, "kern" 1;
  }
  .logo-card .brand-text .word {
    display: inline-block;
  }
  .logo-card .brand-text .word + .word {
    margin-left: 16px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <!-- Hintergrund-Foto: WF-02 v18.3 setzt {{BACKGROUND_PHOTO}} dynamisch -->
    <img class="bg-photo" src="{{BACKGROUND_PHOTO}}" alt="Physio Fuchs Praxis-Foto">

    <div class="title-banner">
      <h1 class="titel">{{TITEL}}</h1>
      <img class="ginkgo" src="../assets/ginkgo-branch.png" alt="">
    </div>

    <div class="logo-card">
      <img src="../assets/pf-logo-medaillon.png" alt="Physio Fuchs Logo">
      <div class="brand-text"><span class="word">Physio</span><span class="word">Fuchs</span></div>
    </div>
  </div>
</body>
</html>
